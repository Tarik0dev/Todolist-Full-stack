
services:

  database:
    image: postgres:17
    container_name: Todo_database
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./Back-end
    container_name: Todo_api
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - RESET_PASSWORD_SECRET=${RESET_PASSWORD_SECRET}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=database
      - DB_PORT=${DB_PORT}
    depends_on:
      - database
    volumes:
      - ./Back-end:/app
      - /app/node_modules
  frontend:
    build: ./Front-end
    container_name: Todo_Frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend


volumes:
  postgres_data: